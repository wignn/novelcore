services:
  account:
    build:
      context: .
      dockerfile: ./account/app.dockerfile
    depends_on:
      account_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${ACCOUNT_DATABASE_URL}
      PORT: ${ACCOUNT_PORT}
    restart: on-failure

  auth:
    build:
      context: .
      dockerfile: ./auth/app.dockerfile
    depends_on:
      account_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      PORT: ${AUTH_PORT}
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY}
    restart: on-failure

  novel:
    build:
      context: .
      dockerfile: ./novel/app.dockerfile
    depends_on:
      novel_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${NOVEL_DATABASE_URL}
      PORT: ${NOVEL_PORT}
    restart: on-failure

  readinglist:
    build:
      context: .
      dockerfile: ./readinglist/app.dockerfile
    depends_on:
      readinglist_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${READINGLIST_DATABASE_URL}
      PORT: ${READINGLIST_PORT}
    restart: on-failure

  review:
    build:
      context: .
      dockerfile: ./review/app.dockerfile
    depends_on:
      review_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${REVIEW_DATABASE_URL}
      PORT: ${REVIEW_PORT}
    restart: on-failure

  graphql:
    build:
      context: .
      dockerfile: ./graphql/app.dockerfile
    ports:
      - 8001:8000
    depends_on:
      - account
      - novel
      - readinglist
      - review
      - auth
    environment:
      ACCOUNT_SERVICE_URL: ${ACCOUNT_SERVICE_URL}
      NOVEL_SERVICE_URL: ${NOVEL_SERVICE_URL}
      READINGLIST_SERVICE_URL: ${READINGLIST_SERVICE_URL}
      REVIEW_SERVICE_URL: ${REVIEW_SERVICE_URL}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      ORIGIN_URL: ${ORIGIN_URL}
    restart: on-failure


  account_db:
    build:
      context: ./account
      dockerfile: ./db.dockerfile
    environment:
      POSTGRES_DB: ${ACCOUNT_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - account_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wignn -d account"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  novel_db:
    build:
      context: ./novel
      dockerfile: ./db.dockerfile
    environment:
      POSTGRES_DB: ${NOVEL_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - novel_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wignn -d novel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  readinglist_db:
    build:
      context: ./readinglist
      dockerfile: ./db.dockerfile
    environment:
      POSTGRES_DB: ${READINGLIST_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - readinglist_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wignn -d readinglist"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  review_db:
    build:
      context: ./review
      dockerfile: ./db.dockerfile
    environment:
      POSTGRES_DB: ${REVIEW_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - review_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wignn -d review"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.24
    environment:
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      discovery.type: single-node
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
      - 9300:9300
    restart: unless-stopped


  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  connect:
    image: debezium/connect:2.6
    depends_on:
      - kafka
      - zookeeper
    ports:
      - 8083:8083
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092  
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      REST_ADVERTISED_HOST_NAME: connect
      PLUGIN_PATH: /kafka/connect,/usr/share/java,/usr/share/confluent-hub-components
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.1
    container_name: kafka-ui
    ports:
      - 4001:8080
    depends_on:
      - kafka
      - zookeeper
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    restart: unless-stopped

volumes:
  account_db_data:
  novel_db_data:
  readinglist_db_data:
  review_db_data:
  redis_data:
  elasticsearch_data: