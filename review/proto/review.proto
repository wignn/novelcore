syntax = "proto3";

package genproto;

option go_package = "github.com/wignn/micro-3/review/genproto";

message Review {
  string id = 1;
  string novel_id = 2;
  string account_id = 3;
  string title = 4;
  string content = 5;
  int32 rating = 6;
  bool is_spoiler = 7;
  int32 upvotes = 8;
  int32 downvotes = 9;
  bytes created_at = 10;
}

message ReviewIdRequest {
  string id = 1;
}

message NovelReviewsRequest {
  string novel_id = 1;
  uint64 skip = 2;
  uint64 take = 3;
}

message PostReviewRequest {
  string novel_id = 1;
  string account_id = 2;
  string title = 3;
  string content = 4;
  int32 rating = 5;
  bool is_spoiler = 6;
}

message ReviewResponse {
  Review review = 1;
}

message ReviewListResponse {
  repeated Review reviews = 1;
}

message DeleteReviewRequest {
  string id = 1;
}

message DeleteReviewResponse {
  string deleted_id = 1;
  string message = 2;
  bool success = 3;
}

service ReviewService {
  rpc PostReview(PostReviewRequest) returns (ReviewResponse);
  rpc GetReview(ReviewIdRequest) returns (Review);
  rpc GetReviewsByNovel(NovelReviewsRequest) returns (ReviewListResponse);
  rpc DeleteReview(DeleteReviewRequest) returns (DeleteReviewResponse);
}
